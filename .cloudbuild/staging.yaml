steps:
  # 1. Build and push the Cocktail MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/cocktail-mcp:${COMMIT_SHA}', './mcp_servers/cocktail_mcp_server']
    id: 'build-cocktail-mcp'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/cocktail-mcp:${COMMIT_SHA}']
    id: 'push-cocktail-mcp'
    waitFor: ['build-cocktail-mcp']

  # 2. Deploy the Cocktail MCP Server to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cocktail-mcp-staging'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/cocktail-mcp:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - '${_APP_SERVICE_ACCOUNT_STAGING}'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID}'
    id: 'deploy-cocktail-mcp'
    waitFor: ['push-cocktail-mcp']

  # 3. Build and push the Weather MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/weather-mcp:${COMMIT_SHA}', './mcp_servers/weather_mcp_server']
    id: 'build-weather-mcp'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/weather-mcp:${COMMIT_SHA}']
    id: 'push-weather-mcp'
    waitFor: ['build-weather-mcp']

  # 4. Deploy the Weather MCP Server to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'weather-mcp-staging'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/weather-mcp:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - '${_APP_SERVICE_ACCOUNT_STAGING}'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID}'
    id: 'deploy-weather-mcp'
    waitFor: ['push-weather-mcp']

  # 5. Extract Cloud Run URLs to pass to Agents
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run services describe cocktail-mcp-staging --region ${_REGION} --format 'value(status.url)' > /workspace/cocktail_url.txt
        gcloud run services describe weather-mcp-staging --region ${_REGION} --format 'value(status.url)' > /workspace/weather_url.txt
    id: 'get-mcp-urls'
    waitFor: ['deploy-cocktail-mcp', 'deploy-weather-mcp']

  # 6. Deploy the Agent Engine Apps
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv==0.8.13 --user && uv sync --locked
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
    waitFor: ['get-mcp-urls']

  - name: "python:3.12-slim"
    id: deploy-agents
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv export --project ./a2a_agents --no-hashes --no-sources --no-header --no-dev --no-emit-project --no-annotate --locked > requirements.txt
        COCKTAIL_URL=$$(cat /workspace/cocktail_url.txt)
        WEATHER_URL=$$(cat /workspace/weather_url.txt)
        
        # Deploy Cocktail Agent
        UV_COCKTAIL_OUTPUT=$$(uv run python -m scripts.deploy_agent \
          --project ${_STAGING_PROJECT_ID} \
          --location ${_REGION} \
          --display-name "Cocktail Agent Staging" \
          --source-packages=./a2a_agents \
          --entrypoint-module=a2a_agents.cocktail_agent.cocktail_agent_executor \
          --entrypoint-class=CocktailAgentExecutor \
          --requirements-file=requirements.txt \
          --service-account=${_APP_SERVICE_ACCOUNT_STAGING} \
          --set-env-vars="MCP_SERVER_URL=$${COCKTAIL_URL},COMMIT_SHA=${COMMIT_SHA}" 2>&1) || { echo "$${UV_COCKTAIL_OUTPUT}"; exit 1; }
        
        # Deploy Weather Agent
        UV_WEATHER_OUTPUT=$$(uv run python -m scripts.deploy_agent \
          --project ${_STAGING_PROJECT_ID} \
          --location ${_REGION} \
          --display-name "Weather Agent Staging" \
          --source-packages=./a2a_agents \
          --entrypoint-module=a2a_agents.weather_agent.weather_agent_executor \
          --entrypoint-class=WeatherAgentExecutor \
          --requirements-file=requirements.txt \
          --service-account=${_APP_SERVICE_ACCOUNT_STAGING} \
          --set-env-vars="MCP_SERVER_URL=$${WEATHER_URL},COMMIT_SHA=${COMMIT_SHA}" 2>&1) || { echo "$${UV_WEATHER_OUTPUT}"; exit 1; }
          
        # Extract Agent Engine IDs using gcloud or from stdout of the deploy script
        # The deploy_agent.py script prints out the playground URL containing the ID
        
        COCKTAIL_AGENT_ID=$$(gcloud ai agents list --project ${_STAGING_PROJECT_ID} --region ${_REGION} --format="value(name)" --filter="displayName='Cocktail Agent Staging'" | head -n 1)
        WEATHER_AGENT_ID=$$(gcloud ai agents list --project ${_STAGING_PROJECT_ID} --region ${_REGION} --format="value(name)" --filter="displayName='Weather Agent Staging'" | head -n 1)
        
        # Deploy Hosting Agent
        echo "Deploying Hosting Agent with Cocktail Agent: $${COCKTAIL_AGENT_ID} and Weather Agent: $${WEATHER_AGENT_ID}"
        uv run python -m scripts.deploy_agent \
          --project ${_STAGING_PROJECT_ID} \
          --location ${_REGION} \
          --display-name "Hosting Agent Staging" \
          --source-packages=./a2a_agents \
          --entrypoint-module=a2a_agents.hosting_agent.agent_executor \
          --entrypoint-class=HostingAgentExecutor \
          --requirements-file=requirements.txt \
          --service-account=${_APP_SERVICE_ACCOUNT_STAGING} \
          --set-env-vars="WEATHER_AGENT_NAME=$${WEATHER_AGENT_ID},COCKTAIL_AGENT_NAME=$${COCKTAIL_AGENT_ID},COMMIT_SHA=${COMMIT_SHA}" || exit 1
          
        HOSTING_AGENT_ID=$$(gcloud ai agents list --project ${_STAGING_PROJECT_ID} --region ${_REGION} --format="value(name)" --filter="displayName='Hosting Agent Staging'" | head -n 1)
        echo "$${HOSTING_AGENT_ID}" > /workspace/hosting_agent_id.txt

    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'PYTHONPATH=/workspace/a2a_agents'
    waitFor: ['install-dependencies']

  # 7. Build and push the Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/frontend:${COMMIT_SHA}', './frontend']
    id: 'build-frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/frontend:${COMMIT_SHA}']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # 8. Deploy the Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        HOSTING_AGENT_ID=$$(cat /workspace/hosting_agent_id.txt)
        gcloud run deploy frontend-staging \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/frontend:${COMMIT_SHA} \
          --region ${_REGION} \
          --service-account ${_APP_SERVICE_ACCOUNT_STAGING} \
          --allow-unauthenticated \
          --set-env-vars "PROJECT_ID=${_STAGING_PROJECT_ID},LOCATION=${_REGION},HOSTING_AGENT_NAME=$${HOSTING_AGENT_ID}"
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-agents']

substitutions:
  _STAGING_PROJECT_ID: YOUR_STAGING_PROJECT_ID
  _REGION: us-central1

logsBucket: gs://${PROJECT_ID}-a2a-multiagent-ge-cicd-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
