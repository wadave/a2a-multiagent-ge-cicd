steps:
  # 1. Build and deploy the Cocktail MCP Server (skip if already deployed with this commit)
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    id: 'deploy-cocktail-mcp'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        apk add --no-cache docker-cli
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/cocktail-mcp:${COMMIT_SHA}"

        # Check if the service is already running this image
        CURRENT_IMAGE=$$(gcloud run services describe cocktail-mcp-prod \
          --region ${_REGION} --format 'value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")

        if [ "$$CURRENT_IMAGE" = "$$IMAGE" ]; then
          echo "Cocktail MCP already deployed with commit ${COMMIT_SHA}, skipping."
        else
          echo "Building and deploying Cocktail MCP Server..."
          docker build -t $$IMAGE ./src/mcp_servers/cocktail_mcp_server
          docker push $$IMAGE
          gcloud run deploy cocktail-mcp-prod \
            --image $$IMAGE \
            --region ${_REGION} \
            --service-account ${_APP_SERVICE_ACCOUNT_PROD} \
            --no-allow-unauthenticated \
            --set-env-vars "PROJECT_ID=${PROJECT_ID}"
        fi

  # 2. Build and deploy the Weather MCP Server (skip if already deployed with this commit)
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    id: 'deploy-weather-mcp'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        apk add --no-cache docker-cli
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/weather-mcp:${COMMIT_SHA}"

        # Check if the service is already running this image
        CURRENT_IMAGE=$$(gcloud run services describe weather-mcp-prod \
          --region ${_REGION} --format 'value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")

        if [ "$$CURRENT_IMAGE" = "$$IMAGE" ]; then
          echo "Weather MCP already deployed with commit ${COMMIT_SHA}, skipping."
        else
          echo "Building and deploying Weather MCP Server..."
          docker build -t $$IMAGE ./src/mcp_servers/weather_mcp_server
          docker push $$IMAGE
          gcloud run deploy weather-mcp-prod \
            --image $$IMAGE \
            --region ${_REGION} \
            --service-account ${_APP_SERVICE_ACCOUNT_PROD} \
            --no-allow-unauthenticated \
            --set-env-vars "PROJECT_ID=${PROJECT_ID}"
        fi

  # 3. Extract Cloud Run URLs to pass to Agents
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run services describe cocktail-mcp-prod --region ${_REGION} --format 'value(status.url)' > /workspace/cocktail_url.txt
        gcloud run services describe weather-mcp-prod --region ${_REGION} --format 'value(status.url)' > /workspace/weather_url.txt
    id: 'get-mcp-urls'
    waitFor: ['deploy-cocktail-mcp', 'deploy-weather-mcp']

  # 4. Install Python dependencies
  - name: "python:3.13-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -e
        pip install uv==0.8.13 --user && uv sync
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
    waitFor: ['get-mcp-urls']

  # 5. Deploy the Agent Engine Apps (skip if already deployed with this commit)
  - name: "python:3.13-slim"
    id: deploy-agents
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -e
        uv export --project ./src/a2a_agents --no-hashes --no-sources --no-header --no-dev --no-emit-project --no-annotate > src/requirements.txt
        COCKTAIL_URL=$$(cat /workspace/cocktail_url.txt)
        WEATHER_URL=$$(cat /workspace/weather_url.txt)

        # Helper: check if agent is already deployed with this COMMIT_SHA
        agent_needs_deploy() {
          local display_name="$$1"
          local agent_id=$$(gcloud ai agents list \
            --project ${_PROD_PROJECT_ID} --region ${_REGION} \
            --format="value(name)" --filter="displayName='$$display_name'" 2>/dev/null | head -n 1)

          if [ -z "$$agent_id" ]; then
            echo "true"
            return
          fi

          # Check COMMIT_SHA env var on the deployed agent
          local deployed_sha=$$(gcloud ai agents describe $$agent_id \
            --project ${_PROD_PROJECT_ID} --region ${_REGION} \
            --format="value(spec.deploymentSpec.dedicatedResources.envVars.COMMIT_SHA)" 2>/dev/null || echo "")

          if [ "$$deployed_sha" = "${COMMIT_SHA}" ]; then
            echo "false"
          else
            echo "true"
          fi
        }

        # Deploy Cocktail Agent
        if [ "$$(agent_needs_deploy 'Cocktail Agent Prod')" = "true" ]; then
          echo "Deploying Cocktail Agent..."
          UV_COCKTAIL_OUTPUT=$$(cd src && PYTHONPATH=.. uv run python -m scripts.deploy_agent \
            --project ${_PROD_PROJECT_ID} \
            --location ${_REGION} \
            --display-name "Cocktail Agent Prod" \
            --source-packages=a2a_agents \
            --entrypoint-module=a2a_agents.cocktail_agent.cocktail_agent_executor \
            --entrypoint-class=CocktailAgentExecutor \
            --requirements-file=requirements.txt \
            --service-account=${_APP_SERVICE_ACCOUNT_PROD} \
            --set-env-vars="CT_MCP_SERVER_URL=$${COCKTAIL_URL},COMMIT_SHA=${COMMIT_SHA}" 2>&1) || { echo "$${UV_COCKTAIL_OUTPUT}"; exit 1; }
        else
          echo "Cocktail Agent already deployed with commit ${COMMIT_SHA}, skipping."
        fi

        # Deploy Weather Agent
        if [ "$$(agent_needs_deploy 'Weather Agent Prod')" = "true" ]; then
          echo "Deploying Weather Agent..."
          UV_WEATHER_OUTPUT=$$(cd src && PYTHONPATH=.. uv run python -m scripts.deploy_agent \
            --project ${_PROD_PROJECT_ID} \
            --location ${_REGION} \
            --display-name "Weather Agent Prod" \
            --source-packages=a2a_agents \
            --entrypoint-module=a2a_agents.weather_agent.weather_agent_executor \
            --entrypoint-class=WeatherAgentExecutor \
            --requirements-file=requirements.txt \
            --service-account=${_APP_SERVICE_ACCOUNT_PROD} \
            --set-env-vars="WEA_MCP_SERVER_URL=$${WEATHER_URL},COMMIT_SHA=${COMMIT_SHA}" 2>&1) || { echo "$${UV_WEATHER_OUTPUT}"; exit 1; }
        else
          echo "Weather Agent already deployed with commit ${COMMIT_SHA}, skipping."
        fi

        # Get Agent Engine IDs (needed for Hosting Agent and Frontend)
        COCKTAIL_AGENT_ID=$$(gcloud ai agents list --project ${_PROD_PROJECT_ID} --region ${_REGION} --format="value(name)" --filter="displayName='Cocktail Agent Prod'" | head -n 1)
        WEATHER_AGENT_ID=$$(gcloud ai agents list --project ${_PROD_PROJECT_ID} --region ${_REGION} --format="value(name)" --filter="displayName='Weather Agent Prod'" | head -n 1)

        # Deploy Hosting Agent
        if [ "$$(agent_needs_deploy 'Hosting Agent Prod')" = "true" ]; then
          echo "Deploying Hosting Agent with Cocktail Agent: $${COCKTAIL_AGENT_ID} and Weather Agent: $${WEATHER_AGENT_ID}"
          (cd src && PYTHONPATH=.. uv run python -m scripts.deploy_agent \
            --project ${_PROD_PROJECT_ID} \
            --location ${_REGION} \
            --display-name "Hosting Agent Prod" \
            --source-packages=a2a_agents \
            --entrypoint-module=a2a_agents.hosting_agent.agent_executor \
            --entrypoint-class=HostingAgentExecutor \
            --requirements-file=requirements.txt \
            --service-account=${_APP_SERVICE_ACCOUNT_PROD} \
            --set-env-vars="WEA_AGENT_URL=https://${_REGION}-aiplatform.googleapis.com/v1beta1/$${WEATHER_AGENT_ID}/environments/default,CT_AGENT_URL=https://${_REGION}-aiplatform.googleapis.com/v1beta1/$${COCKTAIL_AGENT_ID}/environments/default,COMMIT_SHA=${COMMIT_SHA}") || exit 1
        else
          echo "Hosting Agent already deployed with commit ${COMMIT_SHA}, skipping."
        fi

        HOSTING_AGENT_ID=$$(gcloud ai agents list --project ${_PROD_PROJECT_ID} --region ${_REGION} --format="value(name)" --filter="displayName='Hosting Agent Prod'" | head -n 1)
        echo "$${HOSTING_AGENT_ID}" > /workspace/hosting_agent_id.txt

    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'PYTHONPATH=/workspace/src'
    waitFor: ['install-dependencies']

  # 6. Build and deploy the Frontend (skip if already deployed with this commit)
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    id: 'deploy-frontend'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        apk add --no-cache docker-cli
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/frontend:${COMMIT_SHA}"

        # Check if the service is already running this image
        CURRENT_IMAGE=$$(gcloud run services describe frontend-prod \
          --region ${_REGION} --format 'value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")

        HOSTING_AGENT_ID=$$(cat /workspace/hosting_agent_id.txt)

        if [ "$$CURRENT_IMAGE" = "$$IMAGE" ]; then
          echo "Frontend already deployed with commit ${COMMIT_SHA}, skipping."
        else
          echo "Building and deploying Frontend..."
          docker build -t $$IMAGE ./src/frontend
          docker push $$IMAGE
          gcloud run deploy frontend-prod \
            --image $$IMAGE \
            --region ${_REGION} \
            --service-account ${_APP_SERVICE_ACCOUNT_PROD} \
            --allow-unauthenticated \
            --set-env-vars "PROJECT_ID=${_PROD_PROJECT_ID},LOCATION=${_REGION},HOSTING_AGENT_NAME=$${HOSTING_AGENT_ID}"
        fi
    waitFor: ['deploy-agents']

  # 7. Register the Agent to Gemini Enterprise Agentspace
  - name: "python:3.12-slim"
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        # Ensure gcloud is available and authorized if needed
        apt-get update && apt-get install -y curl apt-transport-https ca-certificates gnupg
        curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
        apt-get update && apt-get install -y google-cloud-cli

        # Install dependencies for requests
        pip install requests

        HOSTING_AGENT_ID=$$(cat /workspace/hosting_agent_id.txt)
        HOSTING_URL="https://${_REGION}-aiplatform.googleapis.com/v1beta1/$${HOSTING_AGENT_ID}/environments/default"

        # NOTE: Make sure _AS_APP, _PROJECT_NUMBER, and _AUTH_ID are configured in substitutions
        python scripts/register_agent_to_agentspace.py \
          --project-number=${_PROJECT_NUMBER} \
          --app-id=${_AS_APP} \
          --agent-url="$${HOSTING_URL}" \
          --agent-name="a2a-agent" \
          --display-name="A2A Agent Prod" \
          --description="A2A CI/CD Hosting Agent deployed via Cloud Build" \
          --auth-id=${_AUTH_ID}
    id: 'register-agent'
    waitFor: ['deploy-agents']

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-central1
  # These must be configured for the Agentspace Registration to succeed:
  _PROJECT_NUMBER: YOUR_PROJECT_NUMBER
  _AS_APP: YOUR_AGENT_SPACE_APP_ID
  _AUTH_ID: YOUR_OAUTH_CLIENT_ID

logsBucket: gs://${PROJECT_ID}-a2a-multiagent-ge-cicd-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
