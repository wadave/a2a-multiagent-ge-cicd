steps:
  # 1. Build and deploy the Cocktail MCP Server
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    id: 'deploy-cocktail-mcp'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        apk add --no-cache docker-cli
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/cocktail-mcp:${COMMIT_SHA}"

        echo "Building and deploying Cocktail MCP Server..."
        docker build -t $$IMAGE ./src/mcp_servers/cocktail_mcp_server
        docker push $$IMAGE
        gcloud run deploy cocktail-mcp-ge-prod \
          --image $$IMAGE \
          --region ${_REGION} \
          --service-account ${_APP_SERVICE_ACCOUNT_PROD} \
          --no-allow-unauthenticated \
          --set-env-vars "PROJECT_ID=${PROJECT_ID}"

  # 2. Build and deploy the Weather MCP Server
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    id: 'deploy-weather-mcp'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        apk add --no-cache docker-cli
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/weather-mcp:${COMMIT_SHA}"

        echo "Building and deploying Weather MCP Server..."
        docker build -t $$IMAGE ./src/mcp_servers/weather_mcp_server
        docker push $$IMAGE
        gcloud run deploy weather-mcp-ge-prod \
          --image $$IMAGE \
          --region ${_REGION} \
          --service-account ${_APP_SERVICE_ACCOUNT_PROD} \
          --no-allow-unauthenticated \
          --set-env-vars "PROJECT_ID=${PROJECT_ID}"

  # 3. Extract Cloud Run URLs to pass to Agents (append /mcp/ path with trailing slash for FastMCP servers)
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        # Get Cloud Run URLs and append /mcp/ path (with trailing slash) for FastMCP servers
        CT_URL=$$(gcloud run services describe cocktail-mcp-ge-prod --region ${_REGION} --format 'value(status.url)' 2>&1)
        if [ -z "$$CT_URL" ] || echo "$$CT_URL" | grep -q "ERROR\|NOT_FOUND"; then
          echo "ERROR: Cocktail MCP service not found or failed to deploy"
          exit 1
        fi
        echo "$${CT_URL}/mcp/" > /workspace/cocktail_url.txt

        WEA_URL=$$(gcloud run services describe weather-mcp-ge-prod --region ${_REGION} --format 'value(status.url)' 2>&1)
        if [ -z "$$WEA_URL" ] || echo "$$WEA_URL" | grep -q "ERROR\|NOT_FOUND"; then
          echo "ERROR: Weather MCP service not found or failed to deploy"
          exit 1
        fi
        echo "$${WEA_URL}/mcp/" > /workspace/weather_url.txt

        echo "Cocktail MCP URL: $$(cat /workspace/cocktail_url.txt)"
        echo "Weather MCP URL: $$(cat /workspace/weather_url.txt)"
    id: 'get-mcp-urls'
    waitFor: ['deploy-cocktail-mcp', 'deploy-weather-mcp']

  # 4. Install Python dependencies
  - name: "python:3.13-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -e
        pip install uv==0.8.13 --user && uv sync
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
    waitFor: ['get-mcp-urls']

  # 5. Deploy the Agent Engine Apps using latest src code
  - name: "python:3.13-slim"
    id: deploy-agents
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -e
        # Export requirements from the a2a_agents project
        uv export --project ./src/a2a_agents --no-hashes --no-sources --no-header --no-dev --no-emit-project --no-annotate > src/requirements.txt

        # Set environment variables from MCP URLs and substitutions
        export CT_MCP_SERVER_URL=$$(cat /workspace/cocktail_url.txt)
        export WEA_MCP_SERVER_URL=$$(cat /workspace/weather_url.txt)
        export PROJECT_ID="${_PROD_PROJECT_ID}"
        export GOOGLE_CLOUD_REGION="${_REGION}"
        export APP_SERVICE_ACCOUNT="${_APP_SERVICE_ACCOUNT_PROD}"
        export COMMIT_SHA="${COMMIT_SHA}"
        export DISPLAY_NAME_SUFFIX="Prod"
        export BUCKET_NAME="${_PROD_PROJECT_ID}-bucket"
        export REQUIREMENTS_FILE="requirements.txt"

        # Deploy agents using latest src code
        uv run python deployment/deploy_agents.py
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
    waitFor: ['install-dependencies']

  # 6. Build and deploy the Frontend with dynamic agent ID
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine'
    id: 'deploy-frontend'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        apk add --no-cache docker-cli
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/a2a-multiagent-ge-cicd/frontend:${COMMIT_SHA}"

        # Read and validate hosting agent ID
        if [ ! -f /workspace/hosting_agent_id.txt ]; then
          echo "ERROR: hosting_agent_id.txt not found!"
          exit 1
        fi

        HOSTING_AGENT_RESOURCE=$$(cat /workspace/hosting_agent_id.txt)
        echo "Hosting Agent Resource: $$HOSTING_AGENT_RESOURCE"

        # Extract the engine ID from the full resource name
        # Format: projects/{number}/locations/{loc}/reasoningEngines/{id}
        AGENT_ENGINE_ID=$$(echo "$$HOSTING_AGENT_RESOURCE" | awk -F'/' '{print $$NF}')

        if [ -z "$$AGENT_ENGINE_ID" ]; then
          echo "ERROR: Failed to extract AGENT_ENGINE_ID from: $$HOSTING_AGENT_RESOURCE"
          exit 1
        fi

        echo "Extracted AGENT_ENGINE_ID: $$AGENT_ENGINE_ID"

        echo "Building and deploying Frontend with latest code..."
        docker build -t $$IMAGE ./src/frontend
        docker push $$IMAGE
        gcloud run deploy a2a-frontend-ge2-prod \
          --image $$IMAGE \
          --region ${_REGION} \
          --service-account ${_APP_SERVICE_ACCOUNT_PROD} \
          --allow-unauthenticated \
          --memory 2Gi \
          --timeout 600 \
          --set-env-vars "PROJECT_ID=${_PROD_PROJECT_ID},PROJECT_NUMBER=${_PROJECT_NUMBER},AGENT_ENGINE_ID=$${AGENT_ENGINE_ID},GOOGLE_CLOUD_LOCATION=${_REGION}"
    waitFor: ['deploy-agents']

  # 7. Register the Agent to Gemini Enterprise Agentspace (Optional - only if configured)
  - name: "python:3.12-slim"
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        # Check if Agentspace registration is configured
        if [ -z "${_AS_APP}" ] || [ -z "${_AUTH_ID}" ]; then
          echo "Skipping Agentspace registration - _AS_APP or _AUTH_ID not configured"
          exit 0
        fi

        # Install gcloud and requests
        apt-get update && apt-get install -y curl apt-transport-https ca-certificates gnupg
        curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
        apt-get update && apt-get install -y google-cloud-cli
        pip install requests

        HOSTING_AGENT_ID=$$(cat /workspace/hosting_agent_id.txt)
        HOSTING_URL="https://${_REGION}-aiplatform.googleapis.com/v1beta1/$${HOSTING_AGENT_ID}/environments/default"

        python scripts/register_agent_to_agentspace.py \
          --project-number=${_PROJECT_NUMBER} \
          --app-id=${_AS_APP} \
          --agent-url="$${HOSTING_URL}" \
          --agent-name="a2a-agent" \
          --display-name="A2A Agent GE2 Prod" \
          --description="A2A CI/CD Hosting Agent deployed via Cloud Build" \
          --auth-id=${_AUTH_ID}
    id: 'register-agent'
    waitFor: ['deploy-agents']

# Substitutions are provided by Terraform - DO NOT hard-code values here
# These are set in deployment/terraform/build_triggers.tf
# Optional: _AS_APP and _AUTH_ID for Agentspace registration
substitutions:
  _PROD_PROJECT_ID: ''
  _PROJECT_NUMBER: ''
  _REGION: ''
  _APP_SERVICE_ACCOUNT_PROD: ''
  _AS_APP: ''
  _AUTH_ID: ''

logsBucket: gs://${PROJECT_ID}-a2a-multiagent-ge-cicd-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
